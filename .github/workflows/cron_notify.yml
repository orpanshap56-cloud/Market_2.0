name: Daily Task Notification

on:
  schedule:
    - cron: '0 */1 * * *' # Запуск каждые 6 часов (00:00, 06:00, 12:00, 18:00)
  workflow_dispatch: # Чтобы можно было запустить вручную для теста

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          pip install pandas requests gspread oauth2client
      - name: Run notifier
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          MY_CHAT_ID: ${{ secrets.MY_CHAT_ID }}
          WIFE_CHAT_ID: ${{ secrets.WIFE_CHAT_ID }}
          G_SERVICE_ACCOUNT: ${{ secrets.G_SERVICE_ACCOUNT }}
        run: python notifier.py
